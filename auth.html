<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GroundFloor — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-dim: #7A5E23;
      --off-white: #EDE8DF;
      --muted: #7A7570;
      --dark: #0A0906;
      --dark2: #131109;
      --dark3: #1C1A14;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: url('auth-bg.png') center/cover no-repeat fixed;
      color: var(--off-white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    .auth-container {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Left Side: Hero Image */
    .auth-hero {
      flex: 1;
      background: transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
      position: relative;
    }
    
    .hero-content {
      position: relative;
      z-index: 10;
      max-width: 500px;
    }
    .hero-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: var(--gold);
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 1rem;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }
    .hero-tagline {
      font-size: 1.4rem;
      color: var(--off-white);
      line-height: 1.4;
      text-shadow: 0 4px 20px rgba(0,0,0,1), 0 2px 4px rgba(0,0,0,1);
    }

    /* Right Side: Form */
    .auth-form-container {
      width: 500px;
      background: rgba(10, 9, 6, 0.85); /* Solid enough to read text, no blur */
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem;
      border-left: 1px solid var(--dark3);
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--off-white); }

    .form-header { margin-bottom: 2rem; }
    h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 1px; color: var(--off-white); }
    p.subtitle { color: var(--muted); font-size: 0.95rem; margin-top: 0.3rem; }

    /* Social Buttons */
    .social-btn {
      width: 100%;
      background: var(--dark2);
      border: 1px solid var(--dark3);
      color: var(--off-white);
      padding: 1rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }
    .social-btn:hover { background: var(--dark3); border-color: var(--muted); }

    .divider {
      display: flex; align-items: center; text-align: center; margin: 2rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; border-bottom: 1px solid var(--dark3);
    }
    .divider span { padding: 0 1rem; color: var(--muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

    /* Inputs */
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; color: var(--muted); font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      width: 100%;
      background: rgba(19, 17, 9, 0.5);
      border: 1px solid var(--dark3);
      color: var(--off-white);
      padding: 1rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      transition: all 0.2s;
    }
    input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 10px rgba(201, 168, 76, 0.1); }

    .submit-btn {
      width: 100%;
      background: var(--gold);
      color: var(--dark);
      border: none;
      padding: 1.1rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }

    .toggle-text { text-align: center; margin-top: 2rem; font-size: 0.95rem; color: var(--muted); }
    .toggle-link { color: var(--gold); text-decoration: none; font-weight: 700; cursor: pointer; transition: color 0.2s; }
    .toggle-link:hover { color: var(--off-white); }

    @media (max-width: 900px) {
      .auth-hero { display: none; }
      .auth-form-container { width: 100%; border-left: none; padding: 2rem; }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    
    <!-- Visual Left Side (Hidden on mobile) -->
    <div class="auth-hero">
      <div class="hero-content">
        <div class="hero-logo">GROUNDFLOOR</div>
        <p class="hero-tagline">Every legend started in a bedroom.<br>Now you can be the reason they made it out.</p>
      </div>
    </div>

    <!-- Auth Form Right Side -->
    <div class="auth-form-container">
      <a href="index.html" class="back-link">← Back to Home</a>
      
      <div class="form-header">
        <h2 id="formTitle">Sign In</h2>
        <p class="subtitle" id="formSubtitle">Welcome back. Let's break some records.</p>
      </div>

      <div class="social-login">

        <button class="social-btn">
          <span style="font-size: 1.2rem; font-weight: 900;">G</span> Continue with Google
        </button>
        <button class="social-btn">
          <span style="font-size: 1.2rem;">🎧</span> Continue with Spotify
        </button>
        <button class="social-btn">
          <span style="font-size: 1.2rem;">🍎</span> Continue with Apple Music
        </button>
      </div>

      <div class="divider"><span>or</span></div>

      <form action="create.html">
        <div class="input-group" id="usernameGroup" style="display: none;">
          <label>Username</label>
          <input type="text" placeholder="How you'll appear on supporter walls">
        </div>
        
        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="you@example.com" required>
        </div>
        
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
      </form>

      <div class="toggle-text">
        <span id="togglePrompt">Don't have an account?</span> 
        <a class="toggle-link" onclick="toggleAuthMode()">Create one</a>
      </div>

    </div>
  </div>

  <script>
    let isSignUp = false;

    function toggleAuthMode() {
      isSignUp = !isSignUp;
      
      const title = document.getElementById('formTitle');
      const subtitle = document.getElementById('formSubtitle');
      const usernameGroup = document.getElementById('usernameGroup');
      const submitBtn = document.getElementById('submitBtn');
      const togglePrompt = document.getElementById('togglePrompt');
      const toggleLink = document.querySelector('.toggle-link');

      if (isSignUp) {
        title.innerText = 'Create Account';
        subtitle.innerText = 'Join the ground floor of the next big thing.';
        usernameGroup.style.display = 'block';
        submitBtn.innerText = 'Create Account';
        togglePrompt.innerText = 'Already have an account?';
        toggleLink.innerText = 'Sign in';
      } else {
        title.innerText = 'Sign In';
        subtitle.innerText = 'Welcome back. Let\'s break some records.';
        usernameGroup.style.display = 'none';
        submitBtn.innerText = 'Sign In';
        togglePrompt.innerText = 'Don\'t have an account?';
        toggleLink.innerText = 'Create one';
      }
    }
  </script>
</body>
</html>
